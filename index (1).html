<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Рустам & Алина — 4 июля 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #F5F0E8;
    --cream-dark: #EDE6D6;
    --green-deep: #3D5C2A;
    --green-mid: #5A7A3A;
    --green-light: #8B9E6E;
    --green-pale: #B8C99A;
    --gold: #C4A055;
    --gold-light: #D4B87A;
    --text: #2C3E1A;
  }

  html, body { height: 100%; background: var(--cream); color: var(--text); font-family: 'Jost', sans-serif; overflow-x: hidden; }

  /* ── ENVELOPE ── */
  #envelope-screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: var(--green-deep); z-index: 100; cursor: pointer;
    transition: opacity 0.8s ease, visibility 0.8s ease;
  }
  #envelope-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
  #envelope-screen.opening { animation: envelopeOpen 0.9s ease forwards; }
  @keyframes envelopeOpen {
    0%   { transform: scale(1); opacity: 1; }
    60%  { transform: scale(1.05); opacity: 1; }
    100% { transform: scale(1.15); opacity: 0; }
  }
  .env-bg {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 60% 50% at 30% 40%, rgba(139,158,110,0.12) 0%, transparent 60%),
                radial-gradient(ellipse 40% 60% at 70% 60%, rgba(196,160,85,0.08) 0%, transparent 60%);
  }
  .env-leaf {
    position: absolute; border-radius: 0 100% 0 100%;
    background: rgba(139,158,110,0.25); animation: leafFloat 6s ease-in-out infinite;
  }
  @keyframes leafFloat { 0%,100%{transform:translateY(0) rotate(0deg);opacity:0.3} 50%{transform:translateY(-12px) rotate(15deg);opacity:0.6} }
  .envelope-wrap { position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:32px;animation:fadeUp 1.2s ease both; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
  .envelope-svg { filter: drop-shadow(0 20px 40px rgba(0,0,0,0.4)); }
  .env-label { text-align:center; color:var(--cream); }
  .env-label p:first-child { font-family:'Cormorant Garamond',serif;font-size:clamp(14px,2vw,18px);font-weight:300;letter-spacing:6px;color:var(--green-pale);margin-bottom:6px; }
  .env-label p:last-child { font-family:'Cormorant Garamond',serif;font-size:clamp(32px,5vw,48px);font-weight:300;letter-spacing:3px; }
  .tap-hint { font-family:'Jost',sans-serif;font-size:12px;font-weight:200;letter-spacing:4px;color:var(--green-pale);text-transform:uppercase;animation:pulse 2.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }

  /* ── CARD ── */
  #card { min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 20px 80px;opacity:0;transition:opacity 1s ease 0.3s;position:relative; }
  #card.visible { opacity:1; }
  #card::before { content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 20% 20%,rgba(139,158,110,0.07) 0%,transparent 50%),radial-gradient(ellipse 60% 80% at 80% 80%,rgba(196,160,85,0.05) 0%,transparent 50%);pointer-events:none;z-index:0; }

  .card-inner { position:relative;z-index:1;max-width:520px;width:100%;background:#FDFAF4;border:1px solid rgba(139,158,110,0.3);border-radius:4px;padding:60px 52px 52px;box-shadow:0 2px 4px rgba(61,92,42,0.06),0 8px 32px rgba(61,92,42,0.08),0 40px 80px rgba(61,92,42,0.06),inset 0 1px 0 rgba(255,255,255,0.8);overflow:hidden; }
  .card-inner::before { content:'';position:absolute;inset:10px;border:0.5px solid rgba(139,158,110,0.2);border-radius:2px;pointer-events:none; }

  .reveal { opacity:0;transform:translateY(20px);transition:opacity 0.8s ease,transform 0.8s ease; }
  .reveal.visible { opacity:1;transform:translateY(0); }

  .botanical-top { text-align:center;margin-bottom:32px; }
  .invite-label { text-align:center;font-family:'Jost',sans-serif;font-size:10px;font-weight:300;letter-spacing:5px;color:var(--green-light);text-transform:uppercase;margin-bottom:28px; }

  .names-block { text-align:center;margin-bottom:36px; }
  .name { font-family:'Cormorant Garamond',serif;font-size:clamp(52px,10vw,72px);font-weight:300;color:var(--green-deep);line-height:1;letter-spacing:2px;display:block; }
  .ampersand { display:block;font-family:'Cormorant Garamond',serif;font-size:28px;font-style:italic;color:var(--green-light);margin:4px 0;line-height:1; }

  .divider { display:flex;align-items:center;gap:12px;margin:0 0 36px; }
  .divider-line { flex:1;height:0.5px;background:var(--green-pale);opacity:0.6; }
  .divider-diamond { width:5px;height:5px;background:var(--green-light);transform:rotate(45deg);opacity:0.7; }

  .info-section { text-align:center;margin-bottom:28px; }
  .info-label { font-family:'Jost',sans-serif;font-size:9px;font-weight:300;letter-spacing:5px;color:var(--green-light);text-transform:uppercase;margin-bottom:8px; }
  .info-value { font-family:'Cormorant Garamond',serif;font-size:clamp(22px,4vw,28px);font-weight:400;color:var(--green-deep);letter-spacing:1px; }

  /* location link */
  .location-link { display:inline-block;font-family:'Jost',sans-serif;font-size:10px;font-weight:300;letter-spacing:3px;color:var(--green-light);text-decoration:none;border-bottom:0.5px solid var(--green-pale);padding-bottom:1px;margin-top:6px;text-transform:uppercase;transition:color 0.2s,border-color 0.2s; }
  .location-link:hover { color:var(--green-deep);border-color:var(--green-deep); }

  /* countdown */
  .countdown-block { background:var(--cream-dark);border:0.5px solid rgba(139,158,110,0.25);border-radius:2px;padding:24px 20px 20px;margin:8px 0 32px;text-align:center; }
  .countdown-label { font-family:'Jost',sans-serif;font-size:9px;font-weight:300;letter-spacing:5px;color:var(--green-light);text-transform:uppercase;margin-bottom:16px; }
  .countdown-nums { display:flex;justify-content:center;gap:4px; }
  .cd-unit { display:flex;flex-direction:column;align-items:center;min-width:52px; }
  .cd-num { font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:300;color:var(--green-deep);line-height:1; }
  .cd-sep { font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--green-light);line-height:1;padding-top:2px;opacity:0.6; }
  .cd-lbl { font-family:'Jost',sans-serif;font-size:8px;font-weight:300;letter-spacing:2px;color:var(--green-light);text-transform:uppercase;margin-top:4px; }

  /* RSVP */
  .rsvp-wrap { text-align:center;margin-top:36px; }
  .rsvp-btn { display:inline-block;padding:14px 40px;border:1px solid var(--green-deep);background:transparent;color:var(--green-deep);font-family:'Jost',sans-serif;font-size:11px;font-weight:300;letter-spacing:5px;text-transform:uppercase;cursor:pointer;transition:all 0.3s ease;position:relative;overflow:hidden; }
  .rsvp-btn::after { content:'';position:absolute;inset:0;background:var(--green-deep);transform:translateY(100%);transition:transform 0.3s ease;z-index:-1; }
  .rsvp-btn:hover { color:var(--cream); }
  .rsvp-btn:hover::after { transform:translateY(0); }

  .rsvp-panel { margin-top:20px;overflow:hidden;max-height:0;transition:max-height 0.6s ease,opacity 0.5s ease;opacity:0; }
  .rsvp-panel.open { max-height:320px;opacity:1; }
  .rsvp-inner { border:0.5px solid rgba(139,158,110,0.3);border-radius:2px;padding:20px;background:var(--cream-dark);display:flex;flex-direction:column;gap:10px; }
  .rsvp-input { width:100%;border:0.5px solid rgba(139,158,110,0.4);border-radius:2px;padding:10px 14px;font-family:'Jost',sans-serif;font-size:13px;font-weight:300;background:#FDFAF4;color:var(--text);outline:none;transition:border-color 0.3s; }
  .rsvp-input:focus { border-color:var(--green-mid); }

  .rsvp-select { width:100%;border:0.5px solid rgba(139,158,110,0.4);border-radius:2px;padding:10px 14px;font-family:'Jost',sans-serif;font-size:13px;font-weight:300;background:#FDFAF4;color:var(--text);outline:none;appearance:none;cursor:pointer; }

  .rsvp-submit { align-self:flex-end;padding:10px 28px;background:var(--green-deep);color:var(--cream);border:none;font-family:'Jost',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:background 0.3s,opacity 0.3s; }
  .rsvp-submit:disabled { opacity:0.5;cursor:not-allowed; }
  .rsvp-submit:hover:not(:disabled) { background:var(--green-mid); }

  .rsvp-status { font-family:'Cormorant Garamond',serif;font-size:16px;font-style:italic;color:var(--green-mid);text-align:center;padding:8px 0;min-height:28px; }

  .rsvp-thanks { display:none;font-family:'Cormorant Garamond',serif;font-size:20px;font-style:italic;color:var(--green-mid);text-align:center;padding:20px 0; }

  /* footer */
  .card-footer { text-align:center;margin-top:48px;padding-top:28px;border-top:0.5px solid rgba(139,158,110,0.2); }
  .footer-text { font-family:'Cormorant Garamond',serif;font-size:13px;font-style:italic;color:var(--green-light);letter-spacing:1px; }

  /* petals */
  .petal { position:fixed;top:-20px;border-radius:0 80% 0 80%;animation:fall linear infinite;pointer-events:none;z-index:0; }
  @keyframes fall { 0%{transform:translateY(-20px) rotate(0deg);opacity:0} 10%{opacity:1} 90%{opacity:0.6} 100%{transform:translateY(110vh) rotate(360deg);opacity:0} }

  @media(max-width:520px){.card-inner{padding:44px 28px 40px;}}
</style>
</head>
<body>

<!-- ══ ENVELOPE ══ -->
<div id="envelope-screen" onclick="openInvitation()">
  <div class="env-bg"></div>
  <div class="envelope-wrap">
    <svg class="envelope-svg" width="220" height="160" viewBox="0 0 220 160" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="4" y="30" width="212" height="126" rx="3" fill="#F5F0E8" opacity="0.95"/>
      <line x1="4" y1="156" x2="110" y2="88" stroke="rgba(139,158,110,0.35)" stroke-width="0.8"/>
      <line x1="216" y1="156" x2="110" y2="88" stroke="rgba(139,158,110,0.35)" stroke-width="0.8"/>
      <line x1="4" y1="30" x2="110" y2="88" stroke="rgba(139,158,110,0.25)" stroke-width="0.8"/>
      <line x1="216" y1="30" x2="110" y2="88" stroke="rgba(139,158,110,0.25)" stroke-width="0.8"/>
      <path d="M4 30 L110 100 L216 30 Z" fill="#EDE6D6" opacity="0.9"/>
      <path d="M4 30 L110 100 L216 30" stroke="rgba(139,158,110,0.3)" stroke-width="0.8" fill="none"/>
      <rect x="4" y="30" width="212" height="126" rx="3" stroke="rgba(139,158,110,0.4)" stroke-width="0.8" fill="none"/>
      <circle cx="110" cy="92" r="14" fill="#3D5C2A" opacity="0.9"/>
      <circle cx="110" cy="92" r="11" fill="none" stroke="rgba(196,160,85,0.6)" stroke-width="0.8"/>
      <text x="110" y="97" text-anchor="middle" font-family="Georgia,serif" font-size="12" fill="#D4B87A">R&amp;A</text>
    </svg>
    <div class="env-label">
      <p>Приглашение на свадьбу</p>
      <p>Рустам &amp; Алина</p>
    </div>
    <p class="tap-hint">нажмите, чтобы открыть</p>
  </div>
</div>

<!-- ══ CARD ══ -->
<div id="card">
  <div id="petals"></div>
  <div class="card-inner">

    <div class="botanical-top reveal">
      <svg width="280" height="110" viewBox="0 0 280 110" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M140 108 Q140 75 140 45" stroke="#6B8A52" stroke-width="1" fill="none"/>
        <ellipse cx="125" cy="62" rx="20" ry="7" transform="rotate(-35 125 62)" fill="#8B9E6E" opacity="0.7"/>
        <ellipse cx="155" cy="62" rx="20" ry="7" transform="rotate(35 155 62)" fill="#8B9E6E" opacity="0.7"/>
        <ellipse cx="128" cy="48" rx="16" ry="6" transform="rotate(-20 128 48)" fill="#A3B87A" opacity="0.6"/>
        <ellipse cx="152" cy="48" rx="16" ry="6" transform="rotate(20 152 48)" fill="#A3B87A" opacity="0.6"/>
        <circle cx="140" cy="40" r="5" fill="#C4A882" opacity="0.8"/>
        <circle cx="140" cy="40" r="2.5" fill="#D4B87A" opacity="0.9"/>
        <path d="M140 75 Q110 65 78 50" stroke="#6B8A52" stroke-width="0.9" fill="none"/>
        <ellipse cx="112" cy="68" rx="18" ry="6.5" transform="rotate(-20 112 68)" fill="#8B9E6E" opacity="0.65"/>
        <ellipse cx="90" cy="57" rx="16" ry="6" transform="rotate(-35 90 57)" fill="#A3B87A" opacity="0.6"/>
        <ellipse cx="74" cy="48" rx="13" ry="5" transform="rotate(-45 74 48)" fill="#6B8A52" opacity="0.6"/>
        <path d="M90 57 Q68 48 48 40" stroke="#6B8A52" stroke-width="0.7" fill="none"/>
        <ellipse cx="60" cy="44" rx="12" ry="4.5" transform="rotate(-30 60 44)" fill="#A3B87A" opacity="0.5"/>
        <ellipse cx="44" cy="37" rx="10" ry="4" transform="rotate(-40 44 37)" fill="#8B9E6E" opacity="0.5"/>
        <circle cx="44" cy="34" r="2.5" fill="#C4A882" opacity="0.7"/>
        <circle cx="50" cy="30" r="2" fill="#D4B87A" opacity="0.6"/>
        <path d="M140 75 Q170 65 202 50" stroke="#6B8A52" stroke-width="0.9" fill="none"/>
        <ellipse cx="168" cy="68" rx="18" ry="6.5" transform="rotate(20 168 68)" fill="#8B9E6E" opacity="0.65"/>
        <ellipse cx="190" cy="57" rx="16" ry="6" transform="rotate(35 190 57)" fill="#A3B87A" opacity="0.6"/>
        <ellipse cx="206" cy="48" rx="13" ry="5" transform="rotate(45 206 48)" fill="#6B8A52" opacity="0.6"/>
        <path d="M190 57 Q212 48 232 40" stroke="#6B8A52" stroke-width="0.7" fill="none"/>
        <ellipse cx="220" cy="44" rx="12" ry="4.5" transform="rotate(30 220 44)" fill="#A3B87A" opacity="0.5"/>
        <ellipse cx="236" cy="37" rx="10" ry="4" transform="rotate(40 236 37)" fill="#8B9E6E" opacity="0.5"/>
        <circle cx="236" cy="34" r="2.5" fill="#C4A882" opacity="0.7"/>
        <circle cx="230" cy="30" r="2" fill="#D4B87A" opacity="0.6"/>
      </svg>
    </div>

    <p class="invite-label reveal">Вас приглашают на торжество</p>

    <div class="names-block reveal">
      <span class="name">Рустам</span>
      <span class="ampersand">&amp;</span>
      <span class="name">Алина</span>
    </div>

    <div class="divider reveal">
      <div class="divider-line"></div><div class="divider-diamond"></div><div class="divider-line"></div>
    </div>

    <div class="info-section reveal">
      <p class="info-label">Дата</p>
      <p class="info-value">4 июля 2026 года</p>
    </div>

    <div class="info-section reveal">
      <p class="info-label">Место</p>
      <p class="info-value">Baia Hara Hora</p>
      <p style="font-family:'Jost',sans-serif;font-size:12px;font-weight:300;color:var(--green-light);margin-top:4px;letter-spacing:1px;">КБР, с. Заюково</p>
      <a class="location-link" href="https://yandex.ru/maps/org/baia_hara_hora/169196635080/" target="_blank" rel="noopener">
        📍 Открыть на Яндекс Картах
      </a>
    </div>

    <div class="countdown-block reveal">
      <p class="countdown-label">До свадьбы осталось</p>
      <div class="countdown-nums">
        <div class="cd-unit"><span class="cd-num" id="cd-d">--</span><span class="cd-lbl">дней</span></div>
        <div class="cd-sep">:</div>
        <div class="cd-unit"><span class="cd-num" id="cd-h">--</span><span class="cd-lbl">часов</span></div>
        <div class="cd-sep">:</div>
        <div class="cd-unit"><span class="cd-num" id="cd-m">--</span><span class="cd-lbl">минут</span></div>
        <div class="cd-sep">:</div>
        <div class="cd-unit"><span class="cd-num" id="cd-s">--</span><span class="cd-lbl">секунд</span></div>
      </div>
    </div>

    <div class="divider reveal">
      <div class="divider-line"></div><div class="divider-diamond"></div><div class="divider-line"></div>
    </div>

    <div class="rsvp-wrap reveal">
      <button class="rsvp-btn" onclick="toggleRsvp()">Подтвердить присутствие</button>
      <div class="rsvp-panel" id="rsvp-panel">
        <div class="rsvp-inner" id="rsvp-form">
          <input class="rsvp-input" type="text" placeholder="Ваше имя" id="rsvp-name"/>
          <select class="rsvp-select" id="rsvp-count">
            <option value="1">1 гость</option>
            <option value="2">2 гостя</option>
            <option value="3">3 гостя</option>
            <option value="4">4 гостя</option>
          </select>
          <input class="rsvp-input" type="text" placeholder="Комментарий (необязательно)" id="rsvp-comment"/>
          <p class="rsvp-status" id="rsvp-status"></p>
          <button class="rsvp-submit" id="rsvp-submit" onclick="submitRsvp()">Подтвердить</button>
        </div>
        <div class="rsvp-thanks" id="rsvp-thanks"></div>
      </div>
    </div>

    <div class="card-footer reveal">
      <p class="footer-text">«Любовь никогда не перестаёт»</p>
    </div>

  </div>
</div>

<script>
  // ═══════════════════════════════════════════════
  // ВСТАВЬТЕ СЮДА URL вашего Apps Script после деплоя
  // ═══════════════════════════════════════════════
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyO_jVEeCYzHMcpyKV-NMQ_uGo8o86LIvt65CoHSqvtnzXSz0J_QR9Kxq3naZV0A2hK0Q/exec';
  // ═══════════════════════════════════════════════

  // ENVELOPE
  function openInvitation() {
    const screen = document.getElementById('envelope-screen');
    const card   = document.getElementById('card');
    screen.classList.add('opening');
    setTimeout(() => {
      screen.classList.add('hidden');
      card.classList.add('visible');
      spawnPetals();
      startReveal();
    }, 700);
  }

  // floating leaves on envelope
  window.addEventListener('DOMContentLoaded', () => {
    const s = document.getElementById('envelope-screen');
    for (let i = 0; i < 18; i++) {
      const l = document.createElement('div');
      l.className = 'env-leaf';
      const sz = 5 + Math.random() * 8;
      l.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;width:${sz}px;height:${sz}px;animation-delay:${Math.random()*6}s;animation-duration:${4+Math.random()*4}s;opacity:${0.1+Math.random()*0.3}`;
      s.appendChild(l);
    }
  });

  // REVEAL
  function startReveal() {
    document.querySelectorAll('.reveal').forEach((el, i) => {
      setTimeout(() => el.classList.add('visible'), 200 + i * 120);
    });
  }

  // COUNTDOWN
  const wedding = new Date('2026-07-04T12:00:00');
  function tick() {
    const diff = wedding - new Date();
    if (diff <= 0) {
      ['cd-d','cd-h','cd-m','cd-s'].forEach(id => document.getElementById(id).textContent = '00');
      return;
    }
    document.getElementById('cd-d').textContent = String(Math.floor(diff/86400000)).padStart(2,'0');
    document.getElementById('cd-h').textContent = String(Math.floor((diff%86400000)/3600000)).padStart(2,'0');
    document.getElementById('cd-m').textContent = String(Math.floor((diff%3600000)/60000)).padStart(2,'0');
    document.getElementById('cd-s').textContent = String(Math.floor((diff%60000)/1000)).padStart(2,'0');
  }
  tick(); setInterval(tick, 1000);

  // PETALS
  function spawnPetals() {
    const c = document.getElementById('petals');
    for (let i = 0; i < 16; i++) {
      const p = document.createElement('div');
      p.className = 'petal';
      const sz = 5 + Math.random() * 8;
      p.style.cssText = `left:${Math.random()*100}%;width:${sz}px;height:${sz}px;animation-duration:${8+Math.random()*10}s;animation-delay:${Math.random()*12}s;opacity:${0.2+Math.random()*0.3};transform:rotate(${Math.random()*360}deg);background:${Math.random()>.5?'rgba(139,158,110,0.35)':'rgba(196,160,85,0.25)'};`;
      c.appendChild(p);
    }
  }

  // RSVP
  function toggleRsvp() {
    document.getElementById('rsvp-panel').classList.toggle('open');
  }

  async function submitRsvp() {
    const name    = document.getElementById('rsvp-name').value.trim();
    const count   = document.getElementById('rsvp-count').value;
    const comment = document.getElementById('rsvp-comment').value.trim();
    const status  = document.getElementById('rsvp-status');
    const btn     = document.getElementById('rsvp-submit');

    if (!name) { status.textContent = 'Пожалуйста, введите ваше имя'; return; }

    btn.disabled = true;
    status.textContent = 'Отправляем...';

    try {
      const url = `${APPS_SCRIPT_URL}?name=${encodeURIComponent(name)}&count=${count}&comment=${encodeURIComponent(comment)}`;
      await fetch(url, { method: 'GET', mode: 'no-cors' });

      document.getElementById('rsvp-form').style.display = 'none';
      const thanks = document.getElementById('rsvp-thanks');
      thanks.style.display = 'block';
      thanks.textContent = `Спасибо, ${name}! Мы вас ждём с нетерпением ✦`;
    } catch (e) {
      status.textContent = 'Ошибка отправки. Попробуйте ещё раз.';
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
